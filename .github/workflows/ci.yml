name: CI

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: 测试
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: 下载依赖
        run: go mod download

      - name: 执行测试
        run: go test ./...

  package:
    name: 打包-${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs:
      - test
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            binary_name: cpa-ops
            artifact_name: cpa-ops-linux-amd64
            archive_name: cpa-ops-linux-amd64.tar.gz
          - goos: linux
            goarch: arm64
            binary_name: cpa-ops
            artifact_name: cpa-ops-linux-arm64
            archive_name: cpa-ops-linux-arm64.tar.gz
          - goos: darwin
            goarch: amd64
            binary_name: cpa-ops
            artifact_name: cpa-ops-darwin-amd64
            archive_name: cpa-ops-darwin-amd64.tar.gz
          - goos: darwin
            goarch: arm64
            binary_name: cpa-ops
            artifact_name: cpa-ops-darwin-arm64
            archive_name: cpa-ops-darwin-arm64.tar.gz
          - goos: windows
            goarch: amd64
            binary_name: cpa-ops.exe
            artifact_name: cpa-ops-windows-amd64
            archive_name: cpa-ops-windows-amd64.zip
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: 下载依赖
        run: go mod download

      - name: 编译二进制
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist/${{ matrix.artifact_name }}
          go build -trimpath -ldflags="-s -w" -o dist/${{ matrix.artifact_name }}/${{ matrix.binary_name }} ./cmd/cpa-ops

      - name: 归档发布包
        run: |
          mkdir -p dist/release
          case "${{ matrix.archive_name }}" in
            *.tar.gz)
              tar -C dist/${{ matrix.artifact_name }} -czf dist/release/${{ matrix.archive_name }} .
              ;;
            *.zip)
              cd dist/${{ matrix.artifact_name }}
              zip -q ../release/${{ matrix.archive_name }} ${{ matrix.binary_name }}
              ;;
            *)
              echo "unsupported archive: ${{ matrix.archive_name }}" >&2
              exit 1
              ;;
          esac

      - name: 上传制品
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/release/${{ matrix.archive_name }}
          if-no-files-found: error

  release:
    name: 发布 GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs:
      - package
    permissions:
      contents: write
    steps:
      - name: 下载归档制品
        uses: actions/download-artifact@v4
        with:
          path: dist/release

      - name: 整理 release 文件
        run: |
          mkdir -p dist/final
          find dist/release -type f -exec cp {} dist/final/ \;
          ls -la dist/final

      - name: 上传到 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/final/*
          generate_release_notes: true
          fail_on_unmatched_files: true
